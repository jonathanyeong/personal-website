{{ define "main" }}
<h1>Default Home Page template</h1>
<ul>
  {{ $aboutTitle := "About" }}
  {{ range where .Site.RegularPages "Type" "in" .Site.Params.mainSections }}
  {{if not (eq .Title $aboutTitle) }}
  <li>
    <a href="{{.Permalink}}">{{.Date.Format "2006-01-02"}} | {{.Title}}</a>

  </li>
  {{end}}
  {{ end }}
</ul>

{{end}}
