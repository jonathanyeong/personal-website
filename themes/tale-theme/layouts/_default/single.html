{{ define "main" }}

<main>
	<div class="post">
		{{ partial "single/hero.html" . }}
		<div class="post__all-info">
			{{ partial "single/title.html" . }}
			{{ partial "single/post-info.html" . }}
		</div>
		<div class="post__body">{{ .Content }}</div>
		<div class="post__footer">
			<a href="https://twitter.com/intent/tweet?text=%22{{ .Title }}%22%20by%20@jonoyeong&url={{ .Permalink | absURL }}" title="{{ .Title }}" target="_blank">
				Tweet
			</a>
		</div>
	</div>
</main>

{{ end }}
