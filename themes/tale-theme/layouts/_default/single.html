{{ define "main" }}

<main>
	<div class="post">
		{{ partial "single/hero.html" . }}
		<div class="post__all-info">
			{{ partial "single/title.html" . }}
			{{ partial "single/post-info.html" . }}
		</div>
		<div class="post__body">
			{{ .Content }}
			<hr class="end-of-post"/>
		</div>
		<div class="post__footer">
			<h2>Share This:</h2>
			<div class="social-media-share">
				<a class="twitter-icon"
					href="https://twitter.com/intent/tweet?text=%22{{ .Title }}%22%20by%20@jonoyeong&url={{ .Permalink | absURL }}"
					title="{{ .Title }}" target="_blank">
					<i class="fab fa-twitter-square"></i>
				</a>
			</div>
			<div class="newsletter-cta">
				<h2>Enjoy reading what I write?</h2>
				<p>
					Sign up to get emails every other week about developer growth, learning, and creativity.
				</p>
				<!-- Begin Mailchimp Signup Form -->
				<div id="mc_embed_signup">
					<form action="https://jonathanyeong.us10.list-manage.com/subscribe/post?u=8dfff6deae6f767edbb5f8e71&amp;id=39496fd42b"
						method="post" id="mc-embedded-subscribe-form" name="mc-embedded-subscribe-form" class="validate" target="_blank"
						novalidate>
						<div id="mc_embed_signup_scroll">

							<div class="mc-field-group">
								<input type="email" value="" name="EMAIL" class="required email" id="mce-EMAIL" placeholder="Your email address">
							</div>
							<div id="mce-responses" class="clear">
								<div class="response" id="mce-error-response" style="display:none"></div>
								<div class="response" id="mce-success-response" style="display:none"></div>
							</div>
							<!-- real people should not fill this in and expect good things - do not remove this or risk form bot signups-->
							<div style="position: absolute; left: -5000px;" aria-hidden="true"><input type="text"
									name="b_8dfff6deae6f767edbb5f8e71_39496fd42b" tabindex="-1" value=""></div>
							<div class="clear"><input type="submit" value="Subscribe" name="subscribe" id="mc-embedded-subscribe"
									class="button"></div>
						</div>
					</form>
				</div>

				<!--End mc_embed_signup-->
			</div>
		</div>
	</div>
</main>

{{ end }}
